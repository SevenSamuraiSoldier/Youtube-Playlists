            :root {
                --action-btn-svg-size: 24px;
                --action-btn-svg-size-landscape: 24px;
                --border-color-card: color-mix(in srgb, var(--bg-card), white 10%);
            }
            html {
                font-size: 20px;
            }

            body {
                /* font-family: 'Inter', sans-serif; */
                font-family: sans-serif;
                /* background-color: #121212; */
                color: #e0e0e0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                font-size: 20px;
                background-color: var(--bg-main);
            }

            .container {
                width: 100%;
                /* max-width: 500px; */
                padding: 1rem;
                padding-inline: 0.25rem;
                box-sizing: border-box;
            }

            header {
                display: flex;
                justify-content: center;
                align-items: center;
                margin-bottom: 0.15rem;
                /* flex-wrap: wrap; */
                /* column-gap: 1rem; */
                flex-wrap: nowrap;
            }

            h1 {
                font-size: 1.25rem;
                font-weight: 700;
                /* color: #0d9488; */
                color: var(--text-title-main);
                padding-inline: 1rem;
                text-align: center;
            }

            .header-buttons {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-right: 1rem;
            }

            .action-button {
                /* background-color: #2c2c2c; */
                color: #e0e0e0;
                /* padding: 0.5rem; */ /* Removed in v_3.8 */
                border-radius: 9999px;
                box-shadow:
                    0 4px 6px -1px rgb(0 0 0 / 0.1),
                    0 2px 4px -2px rgb(0 0 0 / 0.1);
                transition: background-color 0.3s ease-in-out;
                border: none;
                cursor: pointer;
                padding: 8px; /* Added in v_3.8 */
                background: var(--bg-main);
            }

            .action-button:hover {
                /* background-color: #3f3f3f; */
                background: color-mix(in srgb, var(--bg-main), rgb(255, 255, 255) 30%);
            }

            .add-button {
                /* background-color: #0c877c; */ /* #0d9488; */
                color: white;
                background: var(--text-title-main);
            }

            .add-button svg {
                fill: var(--bg-main) !important;
            }

            .add-button:hover {
                /* background-color: #0f766e; */
                background: color-mix(in srgb, var(--text-title-main), rgb(255, 255, 255) 30%);
            }
            #count-text-container {
                display: flex;
                flex-direction: row;
                align-content: center;
                align-items: center;
                justify-content: center;
                margin-bottom: 0.5rem;
                column-gap: 1rem;
                padding-inline: 0.85rem;
            }
            #count-text {
                display: inline-block;
                /* color: #a0a0a0; */
                font-weight: 700;
                /* text-align: center; */
                font-size: 0.8em;
                color: var(--text-keys-data);
            }

            .search-container {
                position: relative;
                margin-bottom: 1.5rem;
                text-align: center;
            }

            .search-input {
                width: 80%;
                padding: 0.75rem 0.75rem 0.75rem 2.5rem;
                /* background-color: #2c2c2c; */
                border: 1px solid #333;
                border-radius: 0.5rem;
                /* color: #e0e0e0; */
                font-size: 0.875rem;
                box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
                transition: border-color 0.3s ease-in-out;
                background: var(--bg-card);
                border-color: var(--border-color-card);
                color: var(--text-keys-data);
            }

            .search-input:focus {
                outline: none;
                /* border-color: #0d9488; */
                border-color: var(--text-title-main);
            }

            .search-icon {
                position: absolute;
                left: 1rem;
                top: 50%;
                transform: translateY(-50%);
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .search-icon svg {
                /* fill: #929292; */
                fill: var(--text-keys-data);
            }

            .card-container {
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            .card {
                /* background-color: #1e1e1e; */
                border-radius: 0.75rem;
                padding: 1rem;
                box-shadow:
                    0 4px 6px -1px rgb(0 0 0 / 0.1),
                    0 2px 4px -2px rgb(0 0 0 / 0.1);
                border: 1px solid #333;
                min-height: 160px; /* Added in v_3.8 */
                background: var(--bg-card);
                border-color: var(--bg-card);
                border-color: var(--border-color-card);
            }
            .card img {
                border-radius: 0.5rem;
            }
            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 0.5rem;
                position: relative;
            }

            .card-title {
                display: flex;
                flex-direction: column;
            }

            .card-title h3 {
                font-size: 1.25rem;
                font-weight: 600;
                /* color: #de3d61; */
                margin-top: 0.25em;
                /* margin-block: 0.25em; */
                margin-bottom: 0.5em;
                /* margin-right: 4rem; */ /* Removed in v_3.8 */
                margin-right: 50px; /* Added in v_3.8 */
                color: var(--text-card-title);
            }

            .card-buttons {
                display: flex;
                /* gap: 0.5rem; */ /* Removed in v_3.8 */
                position: absolute;
                flex-direction: column;
                top: 0;
                right: 0;
                gap: 6px; /* Added in v_3.8 */
            }

            .card-detail {
                font-size: 0.875rem;
                /* color: #c0c0c0; */
                margin-bottom: 0.25rem;
                margin-top: 0.5rem;
                /* margin-right: 1rem; */ /* Removed in v_3.8 */
                margin-right: 50px; /* Added in v_3.8 */
                color: var(--text-keys-data);
            }
            .card-long-text {
                margin-right: unset;
            }
            .card-detail strong,
            summary {
                font-weight: 500;
                /* color: #a0a0a0; */
                cursor: pointer;
                color: var(--text-keys-data);
            }
            details p {
                font-size: 0.75rem;
                line-height: 1rem;
                /* color: #b488c6; */
                color: var(--text-data);
            }
            .card-values {
                font-family: sans-serif;
                /*font-weight: 700;*/
                /* color: #b488c6; */
                /* font-size: 0.85em; */
                /* color: #8344e5;
                font-size: 0.75rem;
                font-family: monospace; */
                color: var(--text-data);
            }

            .action-button svg {
                height: var(--action-btn-svg-size);
                width: var(--action-btn-svg-size);
                display: flex;
                justify-content: center;
                align-items: center;
                align-content: center;
                /* fill: #a0a0a0; */
                fill: var(--text-keys-data);
            }
            .del-btn-svg {
                fill: #de3d61;
            }

            .highlight-green {
                /* color: #2dd4bf; */
                font-weight: 600;
                color: var(--text-title-main);
            }

            .highlight-red {
                color: #f87171;
                font-weight: 600;
            }

            .no-data-message {
                text-align: center;
                color: #a0a0a0;
                margin-top: 2.5rem;
                display: none;
            }

            .modal-overlay {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.75);
                display: none;
                justify-content: center;
                align-items: center;
                z-index: 50;
                overflow-y: scroll;
            }

            .modal-content {
                /* background-color: #1e1e1e; */
                border-radius: 0.5rem;
                padding: 1.5rem;
                /* margin: 1rem; */
                width: 100%;
                /* max-width: 400px; */
                box-shadow:
                    0 10px 15px -3px rgb(0 0 0 / 0.1),
                    0 4px 6px -4px rgb(0 0 0 / 0.1);
                display: block;
                flex-direction: column;
                position: fixed;
                align-content: center;
                top: 0px;
                left: 50%;
                transform: translateX(-50%);
                text-align: center;
                background: var(--bg-main);
                color: var(--text-title-main);
            }

            .modal-content h2 {
                font-size: 1.25rem;
                font-weight: 600;
                margin-bottom: 1rem;
                text-align: center;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-group label {
                display: block;
                font-size: 0.875rem;
                font-weight: 500;
                /* color: #a0a0a0; */
                margin-bottom: 0.25rem;
                color: var(--text-card-title);
            }

            .form-group input,
            .form-group select,
            .form-group textarea {
                width: 80%;
                padding: 0.5rem 0.75rem;
                /* background-color: #2c2c2c; */
                border: 1px solid #333;
                border-radius: 0.375rem;
                box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
                font-size: 0.875rem;
                /*  color: #e0e0e0; */
                /* color: bisque; */
                text-align: center;
                background: var(--bg-card);
                border-color: var(--border-color-card);
                color: var(--text-keys-data);
            }
            .form-group input[type="file"] {
                font-size: 0.7rem;
            }

            .form-group input:focus,
            .form-group select:focus,
            .form-group textarea:focus {
                outline: none;
                /* border-color: #2dd4bf; */
                box-shadow: 0 0 0 1px #2dd4bf;
                border-color: var(--text-title-main);
            }

            .modal-buttons {
                display: flex;
                /* justify-content: flex-end; */
                justify-content: space-evenly;
                gap: 0.5rem;
                margin-top: 1rem;
            }

            .modal-buttons button {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
                font-weight: 500;
                border-radius: 0.375rem;
                /* border: none; */
                cursor: pointer;
                transition: background-color 0.3s ease-in-out;
            }

            .btn-cancel {
                /* background-color: #333;
                color: #a0a0a0; */
                background: var(--bg-card);
                color: var(--text-keys-data);
                border: 1px solid;
                border-color: var(--border-color-card);
            }

            .btn-cancel:hover {
                /* background-color: #444; */
                background: color-mix(in srgb, var(--bg-card), rgb(255, 255, 255) 30%);
            }

            .btn-save {
                /* background-color: #0d9488;
                color: white; */
                background: var(--text-title-main);
                color: var(--bg-main);
                border: 1px solid;
                border-color: var(--border-color-card);
            }

            .btn-save:hover {
                /* background-color: #0f766e; */
                background: color-mix(in srgb, var(--text-title-main), rgb(255, 255, 255) 30%);
            }

            .btn-delete {
                background-color: #dc2626;
                color: white;
            }

            .btn-delete:hover {
                background-color: #b91c1c;
            }

            @media (min-width: 640px) {
                .container {
                    padding: 1.5rem;
                }
            }
            @media (orientation: landscape) {
                html {
                    font-size: 12px !important;
                }
                body {
                    margin: 0;
                }
                h1 {
                    font-size: 2rem;
                }
                header {
                    /* justify-content: space-evenly; */
                    /* flex-wrap: wrap; */
                    margin-top: 1rem;
                    flex-wrap: nowrap;
                }
                .header-buttons {
                    margin-left: 5rem;
                }
                .search-input {
                    font-size: 1.5rem;
                }
                .search-icon {
                    left: 5%;
                }

                .card-title h3 {
                    font-size: 1.75rem;
                }
                .card-detail {
                    font-size: 1.5rem;
                }
                .card {
                    width: 30vw;
                    margin: 0;
                }
                .card-container {
                    display: flex;
                    flex-direction: row;
                    gap: 0.5rem;
                    flex-wrap: wrap;
                    align-content: center;
                    justify-content: flex-start;
                }

                /* Below block Added in v_3.8 */
                .card-buttons {
                    gap: 0.5rem;
                }

                summary {
                    font-size: 1.5rem;
                }
                details > p {
                    font-size: 1.35rem;
                    line-height: 1.75rem;
                }
                .container {
                    width: 100%;
                    max-width: unset;
                    padding: 1rem;
                    padding-inline: 0.25rem;
                }
                .action-button {
                    padding: 0.5rem; /* Added in v_3.8 */
                }
                .action-button svg {
                    height: var(--action-btn-svg-size-landscape);
                    width: var(--action-btn-svg-size-landscape);
                }
                .modal-content h2 {
                    font-size: 1.5rem;
                }
                .form-group label {
                    font-size: 1.25rem;
                }
                .form-group input,
                .form-group select,
                .form-group textarea {
                    width: 50%;
                    font-size: 1.5rem;
                }
                .form-group input[type="file"] {
                    font-size: 1rem;
                }
                .modal-buttons button {
                    font-size: 1.25rem;
                    padding-inline: 2rem;
                }
            }
            .master-div {
                margin: 0;
                padding: 0;
            }
            input[type="file"] {
                transition: all 0.3s ease;
            }
            input[type="file"]::file-selector-button:hover {
                transform-origin: center left;
                transform: scale(1.1);
                transition: all 0.3s ease;
            }

            .copied {
                /* background: #228c52; */
                background-color: #ffa7a7;
            }
            #notification-container {
                display: none;
                opacity: 0;
                background-color: #d9d9d985;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 999;
                transition: opacity 0.3s ease;
            }
            .notification-popup {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background-color: #3b3b3b;
                color: red;
                padding: 1rem;
                border-radius: 0.5rem;
                font-family: monospace;
                z-index: 99999;
                text-align: center;
                /* cursor: none; */
            }
            .label-hidden {
                display: none;
            }
            .required-field {
                position: relative;
                /* padding-top: 5px; */
                /* padding-right: 15px; */
                width: fit-content;
                margin-inline: auto;
            }
            .required-field::after {
                content: "*";
                position: absolute;
                top: 0;
                right: 0;
                right: -15px;
                color: red;
                font-size: 14px;
                font-weight: bold;
            }

            .not-required-field {
                position: relative;
                /* padding-top: 5px; */
                /* padding-right: 6rem; */
                width: fit-content;
                margin-inline: auto;
            }
            .not-required-field::after {
                content: " (Optional)";
                position: absolute;
                top: 0; /* Top of label */
                /* right: 0; */
                right: -75px;
                color: #2fa760;
                font-size: 14px;
                font-weight: bold;
            }

            #rules-label {
                position: fixed;
                top: 10px;
                left: 15%;
                display: inline-block;
                font-size: 14px;
                /* color: #686767; */
                color: var(--text-keys-data);
            }
            #rules-label::before {
                content: "*";
                color: red;
                font-size: 14px;
                position: absolute;
                top: 0;
                left: -16px;
            }
            #versionNumber {
                position: fixed;
                top: 0;
                right: 0;
                padding-block: 0.5rem;
                padding-inline: 0.75rem;
                color: #de3d61;
                font-family: sans-serif;

                const parts = query.split(/,/g);

                parts.forEach((part) => {
                    // Preserve spaces within the part (do NOT trim inside)
                    const trimmedEnd = part.replace(/\s+$/, ""); // trim only trailing spaces for logic
                    const endsWithSpace = part.length > trimmedEnd.length;
                    const trimmedPart = part.trimStart(); // trim only start to preserve trailing spaces for match criteria

                    if (trimmedPart.length > 0) {
                        result.push({
                            word: trimmedPart,
                            endsWithSpace: endsWithSpace, // true if unit ends with space (before comma)

                        });
                    }
                });

            // Function to resize the photo to heightLimit variable & Convert to Base64
            function fileToBase64(file, heightLimit) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement("canvas");
                            const targetHeight = heightLimit;
                            const aspectRatio = img.width / img.height;
                            canvas.height = targetHeight;
                            canvas.width = targetHeight * aspectRatio;
                            const ctx = canvas.getContext("2d");
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            // You can adjust the JPEG quality here (0.1 to 1)
                            const resizedBase64 = canvas.toDataURL("image/jpeg", 1);
                            resolve(resizedBase64);
                        };
                        img.onerror = reject;
                        img.src = reader.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

                        modalFormInnerHTML += `   <div class="form-group">

                            <input type="text" id="${key}" ${config.required ? "required" : ""}>
                        </div>\n`;
                    } else if (config.type === "link" && dataMap[key]) {
                        modalFormInnerHTML += `   <div class="form-group">
                            <label for="${key}" ${requiredClass} >${config.text}</label>
                            <input type="url" id="${key}" ${config.required ? "required" : ""}>
                        </div>\n`;
                    } else if (config.type === "select" && dataMap[key].defaultOptions) {
                        let optionsHTML = "";
                        let options = config.defaultOptions
                            .split(",")
                            .map((s) => s.trim())
                            .filter((s) => s.length > 0);
                        options.forEach((optionText) => {
                            optionsHTML += `<option value="${optionText}">${optionText}</option>\n`;
                        });
                        // console.log(optionsHTML); // For Debugging
                        modalFormInnerHTML += `   <div class="form-group">
                            <label for="${key}" ${requiredClass} >${config.text}</label>
                            <select id="${key}" ${config.required ? "required" : ""}>
                                ${optionsHTML}
                            </select>
                        </div>\n`;
                    } else if (config.type === "datalist" && dataMap[key].defaultOptions) {
                        // console.log("Datalist Element Created.."); // For Debugging
                        modalFormInnerHTML += `   <div class="form-group">
                            <label for="${key}" ${requiredClass} >${config.text}</label>
                            <input type="text" id="${key}" list="${key}List" class="datalist-type" enterkeyhint="done" ${config.required ? "required" : ""}>
                            <datalist id="${key}List"></datalist>
                        </div>\n`;
                    } else if (config.type === "photo") {
                        modalFormInnerHTML += `   <div class="form-group">
                            <label for="${key}" ${requiredClass} >${config.text}</label>
                            <input
                                type="file"
                                id="${key}"
                                accept="image/png,image/jpeg,image/webp"/
                                ${config.required ? "required" : ""}>
                                
                            </div>\n`;
                    } else if (config.type === "dropText" && dataMap[key]) {
                        if (config.inputFieldType === "input") {
                            modalFormInnerHTML += `   <div class="form-group">
                                    <label for="${key}" ${requiredClass} >${config.text}</label>
                                    <input type="text" id="${key}" ${config.required ? "required" : ""}>
                                </div>\n`;
                        } else if (config.inputFieldType === "textarea") {
                            modalFormInnerHTML += `   <div class="form-group">
                                    <label for="${key}" ${requiredClass} >${config.text}</label>
                                    <textarea id="${key}" rows="${getRows(config)}" cols="50" ${config.required ? "required" : ""}></textarea>
                                </div>\n`;
                        }
                    } else if (config.type === "number" && dataMap[key]) {
                        modalFormInnerHTML += `   <div class="form-group">
                            <label for="${key}" ${requiredClass} >${config.text}</label>
                            <input type="number" step="1" id="${key}" value="0" min=${config.min} max=${config.max} inputmode="numeric" />
                        </div>\n`;
                    }
                });
                modalFormInnerHTML += `   <div class="modal-buttons">
                    <button type="button" id="cancelAddEditBtn" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-save">Save</button>
                </div>`;

                wishlistForm.innerHTML = modalFormInnerHTML;

                // Cancel Add/Edit
                const cancelAddEditBtn = document.getElementById("cancelAddEditBtn");
                cancelAddEditBtn.addEventListener("click", () => hideModal(addEditModal));
            }

            function dynamicallyRenderCards(data, doc, dataMap) {
                let cardButtons = "";
                let cardDetails = "";
                let cardTitle = "";

                // Title (special handling)
                if (dataMap.title) {
                    cardTitle = `
                        <div class="card-title">
                            <h3 id="title" class="highlight-green">${data.title || "-"}</h3>
                        </div>
                    `;
                }

                // Buttons and links
                Object.keys(dataMap).forEach((key) => {
                    const config = dataMap[key];
                    if (config.type === "link" && data[key]) {
                        // You can customize SVG/icon as needed per type/link
                        cardButtons += `<a href="${data[key]}" target="_blank" class="action-button">${mapLinkSvg}</a>`;
                    } else if (config.type === "photo" && data[key] && data[key] != "") {
                        if (config.mode === "display") {
                            const img = new Image();
                            img.src = data[key];
                            if (img.naturalWidth < img.naturalHeight) {
                                cardDetails += `
                                <img src="${data[key]}" style="height: ${config.height}px;">`;
                            } else {
                                cardDetails += `
                                <img src="${data[key]}" style="width: ${config.height}px;">`;
                            }
                        } else if (config.mode === "download") {
                            console.log("Add Logic For Download here...");
                        } else {
                            console.log("photo mode value is invalid!");
                        }
                    }
                });

                const isFavorite = data.fav === "Fav.";
                // Edit/delete buttons (always present)
                cardButtons += `
                    <button class="action-button edit-button" data-id="${doc.id}">${editBtnSvg}</button>
                    <button class="action-button delete-button" data-id="${doc.id}">${deleteBtnSvg}</button>
                    <button class="action-button fav-button" data-id="${doc.id}" data-fav="${data.fav || ""}" style="fill: ${isFavorite ? "red" : "#5b5b5b"};">
                        <svg width="24px" height="24px" viewBox="0 0 16 16" fill="none">
                            <path d="M1.24 8.24L8 15l6.76-6.76C15.55 7.45 16 6.37 16 5.24V5.05C16 2.81 14.18 1 11.95 1c-1.23 0-2.39.56-3.17 1.52L8 3.5l-.78-.98C6.45 1.56 5.28 1 4.05 1 1.81 1 0 2.81 0 5.05v.19c0 1.13.45 2.2 1.24 3z" fill="${isFavorite ? "red" : "#5b5b5b"}"/>
                        </svg>
                    </button>
                `;

                // Details
                Object.keys(dataMap).forEach((key) => {
                    const config = dataMap[key];
                    let labelHiddenFlag;
                    let suffix = "";
                    if (dataMap[key].hasOwnProperty("labelVisibility") && config.labelVisibility === false) {
                        // console.log("Label is Hidden");
                        labelHiddenFlag = `class="label-hidden"`;
                    } else {
                        labelHiddenFlag = ``;
                        /* console.log("label is Shown"); */
                    }

                    if (dataMap[key].hasOwnProperty("dataSuffix") && config.dataSuffix.trim() != "") {
                        if (data[key].trim() != "") {
                            suffix = config.dataSuffix.trim();
                            // console.log(`Suffix: ${suffix}`); //For Debugging
                        }
                    }

                    if (key !== "title" && key !== "fav" && config.type !== "link" && config.type !== "photo" && config.type !== "dropText") {
                        // Generate label with fallback value
                        // let value = data[key] || '-';
                        let value = data[key] || "";
                        let line = "";
                        if (config.styling === "strong") {
                            line = `<p class="card-detail"><strong ${labelHiddenFlag}>${config.text}: &nbsp;</strong> <span class="highlight-green card-values" id="${key}">${value} ${suffix}</span></p>`;
                            //console.log("this block"); // For Debugging
                        } else {
                            line = `<p class="card-detail"><strong ${labelHiddenFlag}>${config.text}:  &nbsp;</strong><span class="card-values" id="${key}">${value} ${suffix}</span></p>`;
                        }
                        cardDetails += line;
                    } else if (config.type === "dropText" && data[key]) {
                        cardDetails += `
                        <div class="card-detail">
                            <details>
                                <summary>${config.text}</summary>
                                <p  id="${key}">${data[key]} ${suffix}</p>
                            </details>
                        </div>

                        `;
                    }
                });

                // Build card HTML
                return `
                    <div class="card-header">
                        ${cardTitle}
                        <div class="card-buttons">
                            ${cardButtons}
                        </div>
                    </div>
                    <div class="card-details">
                        ${cardDetails}
                    </div>
                `;
            }

            // Card rendering function
            function createCard(doc) {
                const data = doc.data();
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = dynamicallyRenderCards(data, doc, dataMap);
                Object.keys(data).forEach((key) => {
                    if (key !== "timestamp") {
                        if (dataMap[key] && dataMap[key].clickToCopy) {
                            // console.log("Key: "+key);
                            const clickElement = card.querySelector(`#${key}`);
                            // console.log(clickElement);
                            addCopyClick(clickElement);
                        }
                    }
                });
                return card;
            }

            // Render documents based on search query - Major Modification on v_2.5
            function renderDocs(query) {
                wishlistContainer.innerHTML = "";
                const keywordObjs = parseKeywords(query.toLowerCase());

                const filteredDocs = allDocs.filter((doc) => {
                    const data = doc.data();

                    if (keywordObjs.length === 0) return true;

                    /* return keywordObjs.every(({ word, endsWithSpace }) => {
                        let regex;

                        // Use whole word match if endsWithSpace, else prefix match
                        if (endsWithSpace) {
                            regex = new RegExp(`\\b${escapeRegex(word.trimEnd())}\\b`, 'i'); // whole word match
                        } else {
                            regex = new RegExp(`\\b${escapeRegex(word)}`, 'i');    // prefix match
                        }

                        let searchableText = '';
                        Object.keys(dataMap).forEach(key => {
                            if (dataMap[key].filter === true) {
                                searchableText += ` ${data[key] || ""}`;
                            }
                        });

                        return regex.test(searchableText);
                    });
                     */
                    return keywordObjs.every(({word, endsWithSpace}) => {
                        // Regex to detect numeric comparison query like ">550" or "<600"
                        // const numericMatch = word.match(/^([<>])(\d+)$/); //Old Code v_3.0
                        const numericMatch = word.match(/^([<>])(\d+(\.\d+)?)$/);

                        if (numericMatch) {
                            const operator = numericMatch[1];
                            const numValue = Number(numericMatch[2]);
                            // console.log ("Query Value: " + numValue); //For Debugging

                            // Check numeric fields for any matching number by operator
                            /* return Object.keys(dataMap).some(key => {
                                if (dataMap[key].isNumeric) {  // Identify numeric fields
                                    const fieldVal = Number(data[key]);
                                    if (isNaN(fieldVal)) return false;
                                    if (operator === '>' && fieldVal > numValue) return true;
                                    if (operator === '<' && fieldVal < numValue) return true;
                                }
                                return false;
                            }); */

                            // Check numeric fields for any matching number by operator
                            return Object.keys(dataMap).some((key) => {
                                if (dataMap[key].isNumeric) {
                                    // Identify numeric fields
                                    const rawVal = data[key];
                                    if (rawVal == null) return false;

                                    // Extract all numeric substrings (including decimals, negatives)
                                    const matches = String(rawVal).match(/-?\d+(\.\d+)?/g);
                                    if (!matches) return false;

                                    // Check if any extracted number satisfies the condition
                                    return matches.some((numStr) => {
                                        const fieldVal = parseFloat(numStr);
                                        // console.log(fieldVal); //For Debugging
                                        if (operator === ">" && fieldVal > numValue) {
                                            /* console.log(`*********\n data[key]= ${rawVal}\n Match= ${fieldVal}\n*********\n`); //For Debugging */
                                            return true;
                                        }
                                        if (operator === "<" && fieldVal < numValue) {
                                            /* console.log(`#########\n data[key]= ${rawVal}\n Match= ${fieldVal}\n#########\n`); //For Debugging */
                                            return true;
                                        }
                                        return false;
                                    });
                                }
                                return false;
                            });
                        }

                        // Fallback to your existing regex matching for string search keywords
                        const regex = endsWithSpace ? new RegExp(`\\b${escapeRegex(word)}\\b`, "i") : new RegExp(`\\b${escapeRegex(word)}`, "i");

                        let searchableText = "";
                        Object.keys(dataMap).forEach((key) => {
                            if (!dataMap[key].isNumeric && dataMap[key].filter === true) {
                                searchableText += ` ${data[key] || ""}`;
                            }
                        });

                        return regex.test(searchableText);
                    });
                });

                visibleEntriesCount = 0;
                if (filteredDocs.length === 0) {
                    noDataMessage.style.display = "block";
                    noDataMessage.textContent = "No matching entries found.";
                } else {
                    noDataMessage.style.display = "none";
                    filteredDocs.forEach((doc) => {
                        const card = createCard(doc);
                        wishlistContainer.appendChild(card);
                        card.addEventListener("click", addFavorites);
                        visibleEntriesCount++;
                    });
                }
                updateCountText();
            }

            // Delegate click events for edit and delete buttons on the wishlist container
            wishlistContainer.addEventListener("click", (e) => {
                const editBtn = e.target.closest(".edit-button");
                const deleteBtn = e.target.closest(".delete-button");

                if (editBtn) {
                    const docId = editBtn.dataset.id;
                    console.log(docId); // For Debugging
                    db.collection(collectionName)
                        .doc(docId)
                        .get()
                        .then((doc) => {
                            if (doc.exists) {
                                const data = doc.data();
                                docIdInput.value = docId;

                                Object.keys(dataMap).forEach((key) => {
                                    // const config = dataMap[key];
                                    if (dataMap[key].type === "photo") {
                                        editingPhotoOGBase64[key] = data[key];
                                        //console.log(key); // For Debugging
                                        // console.log(editingPhotoOGBase64[key]); // For Debugging
                                        //console.log("photo data");
                                        return;
                                    } else {
                                        // document.getElementById(`${key}`).value = data[key] || ''; // Old Code v_2.6

                                        //Removed in v_3.7
                                        // wishlistForm.querySelector(`#${key}`).value = data[key] || '';

                                        //Added in v_3.7
                                        const element = wishlistForm.querySelector(`#${key}`);
                                        if (element) {
                                            element.value = data[key] || "";
                                        } else {
                                            console.warn(`Element with ID '${key}' not found in form`);
                                        }
                                    }
                                });
                                modalTitle.textContent = "Edit Entry";
                                showModal(addEditModal);
                            }
                        })
                        .catch((error) => {
                            console.error("Error fetching document for edit: ", error);
                            showInfoModal("Could not load entry for editing.");
                        });
                }

                if (deleteBtn) {
                    const docId = deleteBtn.dataset.id;
                    console.log(docId); // For Debugging
                    hideModal(addEditModal);
                    showModal(deleteModal);
                    confirmDeleteBtn.dataset.id = docId;
                }
            });

            // Handle form submission for Add/Edit
            wishlistForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const docId = docIdInput.value;
                let data = {};
                /* Object.keys(dataMap).forEach(async key => {....}); Old Code Block....*/
                for (const key of Object.keys(dataMap)) {
                    // const element = document.getElementById(key); // Old Code v_2.6
                    const element = wishlistForm.querySelector(`#${key}`);
                    // console.log(element); // For Debugging
                    if (element) {
                        const rawValue = element.value.trim();

                        if (dataMap[key].type === "link") {
                            data[key] = rawValue;
                        } else if (dataMap[key].type === "photo") {
                            data[key] = editingPhotoOGBase64[key];
                            // console.log(data[key]); // For Debugging
                            const input = document.getElementById(key);

                            if (input && input.files && input.files.length > 0) {
                                const photoFile = input.files[0];
                                // console.log(photoFile); // For Debugging

                                const heightLimit = dataMap[key].height;
                                // console.log("heightLimit: " + heightLimit); // For Debugging
                                const photoBase64 = await fileToBase64(photoFile, heightLimit);
                                // console.log("photoBase64: " + photoBase64); // For Debugging
                                data[key] = photoBase64;
                                // console.log("[key]: " + key); // For Debugging
                                // console.log("data[key]: " + data[key]); // For Debugging
                                console.log("photoFile is NOT EMPTY");
                            } else {
                                console.log("photoFile is EMPTY");
                                // data[key] = editingPhotoOGBase64[key]; //This code is not needed
                                if (typeof data[key] === "undefined") {
                                    data[key] = "";
                                }
                            }
                            //console.log(data[key]); // For Debugging
                        } else {
                            if (dataMap[key].capitalize === true) {
                                /* console.log("capitalize is Ture"); //For Debugging */
                                data[key] = capitalizeEachWord(rawValue);
                            } else {
                                /* console.log("capitalize is False"); //For Debugging */
                                data[key] = rawValue;
                            }
                        }
                    } else {
                        data[key] = null;
                    }
                }
                // Add timestamp as the last key
                data.timestamp = Date.now();
                // console.log(data); // For Debugging
                const notificationTimeout = 1000;

                try {
                    if (docId) {
                        await db.collection(collectionName).doc(docId).update(data);
                        // showInfoModal("Entry updated successfully!");
                        const notificationMessage = "Entry updated successfully!";
                        activatePopupNotification(notificationMessage, undefined, notificationTimeout);
                    } else {
                        await db.collection(collectionName).add(data);
                        //console.log(data); // For Debugging
                        const notificationMessage = "New entry added successfully!";
                        activatePopupNotification(notificationMessage, undefined, notificationTimeout);
                        // showInfoModal("New entry added successfully!");
                        //visibleEntriesCount ++;
                        updateCountText();
                    }
                    hideModal(addEditModal);
                } catch (error) {
                    console.error("Error saving document: ", error);
                    showInfoModal("Error saving entry. Please try again.");
                }
            });
        </script>
